{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-12 mb-12 px-4">
    <div class="bg-white shadow-md rounded-2xl p-8 border border-purple-100">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-purple-800">Welcome Back</h2>
            <p class="text-gray-500 mt-1 text-sm">Login to your EkannoBorti account</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="bg-red-100 border border-red-300 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required autofocus
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none text-sm"
                       placeholder="Enter your username">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none text-sm"
                       placeholder="Enter your password">
            </div>

            <button type="submit"
                    class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-xl font-semibold transition text-sm">
                Login
            </button>
        </form>

        <hr class="my-6 border-gray-200">
        <p class="text-center text-gray-500 text-sm">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-pink-600 hover:text-pink-700 font-semibold">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
