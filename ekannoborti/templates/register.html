{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10 mb-12 px-4">
    <div class="bg-white shadow-md rounded-2xl p-8 border border-pink-100">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-purple-800">Create Account</h2>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="bg-red-100 border border-red-300 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="name" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm"
                       placeholder="Enter your full name">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm"
                       placeholder="Enter your email">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm"
                       placeholder="Choose a username">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm"
                       placeholder="Create a password">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Register as:</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="flex items-center gap-2 border border-gray-300 rounded-xl px-4 py-3 cursor-pointer hover:border-pink-400 hover:bg-pink-50 transition">
                        <input type="radio" name="role" value="manager" class="text-pink-600">
                        <span class="text-sm text-gray-700"> Manager</span>
                    </label>
                    <label class="flex items-center gap-2 border border-gray-300 rounded-xl px-4 py-3 cursor-pointer hover:border-purple-400 hover:bg-purple-50 transition">
                        <input type="radio" name="role" value="member" required class="text-purple-600">
                        <span class="text-sm text-gray-700"> Member</span>
                    </label>
                    <label class="flex items-center gap-2 border border-gray-300 rounded-xl px-4 py-3 cursor-pointer hover:border-pink-400 hover:bg-pink-50 transition">
                        <input type="radio" name="role" value="seeker" class="text-pink-600">
                        <span class="text-sm text-gray-700"> Room Seeker</span>
                    </label>
                </div>
            </div>

            <button type="submit"
                    class="w-full bg-pink-500 hover:bg-pink-600 text-white py-3 rounded-xl font-semibold transition text-sm">
                Create Account
            </button>
        </form>

        <hr class="my-6 border-gray-200">
        <p class="text-center text-gray-500 text-sm">
            Already have an account?
            <a href="{% url 'login' %}" class="text-purple-600 hover:text-purple-700 font-semibold">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
