{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-12 mb-12 px-4">
    <div class="bg-white shadow-md rounded-2xl p-8 border border-blue-100">

        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-purple-800">Change Password</h2>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="px-4 py-3 rounded-lg mb-4 text-sm
                {% if message.tags == 'error' %}bg-red-100 border border-red-300 text-red-700
                {% else %}bg-green-100 border border-green-300 text-green-700{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Current Password</label>
                <input type="password" name="old_password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm"
                       placeholder="Enter current password">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">New Password</label>
                <input type="password" name="new_password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm"
                       placeholder="Enter new password">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Confirm New Password</label>
                <input type="password" name="confirm_password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm"
                       placeholder="Confirm new password">
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl text-sm font-medium transition">
                    Update Password
                </button>
                <a href="{% url 'profile' %}"
                   class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-6 py-2 rounded-xl text-sm font-medium transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
