{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-10 max-w-2xl">
    <div class="bg-white shadow-md rounded-2xl p-8 border border-blue-100">

        <h2 class="text-2xl font-bold text-purple-800 mb-6"> Edit Profile</h2>

        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <div class="text-center mb-4">
                {% if user_profile.profile_picture %}
                    <img src="{{ user_profile.profile_picture.url }}" alt="Profile"
                         class="w-24 h-24 rounded-full object-cover border-4 border-purple-400 mx-auto mb-3">
                {% else %}
                    <div class="w-24 h-24 rounded-full bg-purple-500 text-white flex items-center justify-center text-4xl font-bold mx-auto mb-3">
                        {{ user.username|slice:":1"|upper }}
                    </div>
                {% endif %}
                <label class="cursor-pointer">
                    <span class="bg-purple-100 hover:bg-purple-200 text-purple-700 px-4 py-2 rounded-xl text-sm transition">
                        Change Picture
                    </span>
                    <input type="file" name="profile_picture" accept="image/*" class="hidden">
                </label>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Full Name</label>
                    <input type="text" name="name" value="{{ user.first_name }}"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Email</label>
                    <input type="email" name="email" value="{{ user.email }}"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Phone</label>
                    <input type="text" name="phone" value="{{ user_profile.phone }}"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm"
                           placeholder="">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Gender</label>
                    <select name="gender"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm bg-white">
                        <option value="">-- Select --</option>
                        <option value="male" {% if user_profile.gender == 'male' %}selected{% endif %}>Male</option>
                        <option value="female" {% if user_profile.gender == 'female' %}selected{% endif %}>Female</option>
                        <option value="other" {% if user_profile.gender == 'other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Date of Birth</label>
                    <input type="date" name="date_of_birth"
                           value="{{ user_profile.date_of_birth|date:'Y-m-d' }}"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Student ID</label>
                    <input type="text" name="student_id" value="{{ user_profile.student_id }}"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm"
                           placeholder="">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Institution</label>
                <input type="text" name="institution" value="{{ user_profile.institution }}"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm"
                       placeholder="University / College name">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Address</label>
                <textarea name="address" rows="3"
                          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none text-sm"
                          placeholder="Enter your address">{{ user_profile.address }}</textarea>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl text-sm font-medium transition">
                    Save Changes
                </button>
                <a href="{% url 'profile' %}"
                   class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-6 py-2 rounded-xl text-sm font-medium transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
